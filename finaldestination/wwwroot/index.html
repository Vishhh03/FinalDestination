<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinalDestination - Luxury Hotel Booking</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="logo">
                    <h2>FinalDestination</h2>
                </div>
                <div class="nav-links" id="nav-links">
                    <a href="#/" class="nav-link">Home</a>
                    <a href="#/hotels" class="nav-link">Hotels</a>
                    <a href="#/bookings" class="nav-link" id="bookings-link" style="display: none;">My Bookings</a>
                    <a href="#/loyalty" class="nav-link" id="loyalty-link" style="display: none;">Rewards</a>
                    <a href="#/admin" class="nav-link" id="admin-link" style="display: none;">Admin</a>
                    <a href="#/login" class="nav-link" id="auth-link">Login</a>
                </div>
                <button class="mobile-toggle" id="mobile-toggle">☰</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app" class="main">
        <!-- Content will be loaded here dynamically -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 FinalDestination. Luxury Hotel Booking Platform.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
